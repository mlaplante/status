owner: mlaplante
repo: status

sites:
  - name: Main site
    url: https://michaellaplante.com
    headers:
      - "User-Agent: Mozilla/5.0 (compatible; UpptimeBot/1.0; +https://status.michaellaplante.com)"
  - name: Blog
    url: https://michaellaplante.com/blog
    headers:
      - "User-Agent: Mozilla/5.0 (compatible; UpptimeBot/1.0; +https://status.michaellaplante.com)"
  - name: Contact form endpoint
    url: https://michaellaplante.com/api/contact
    method: GET
    expectedStatusCodes:
      - 200
      - 405
    headers:
      - "User-Agent: Mozilla/5.0 (compatible; UpptimeBot/1.0; +https://status.michaellaplante.com)"
  - name: Sign
    url: https://sign.michaellaplante.com
    headers:
      - "User-Agent: Mozilla/5.0 (compatible; UpptimeBot/1.0; +https://status.michaellaplante.com)"
  - name: Drop
    url: https://drop.michaellaplante.com
    headers:
      - "User-Agent: Mozilla/5.0 (compatible; UpptimeBot/1.0; +https://status.michaellaplante.com)"
  - name: Intake
    url: https://intake.michaellaplante.com
    headers:
      - "User-Agent: Mozilla/5.0 (compatible; UpptimeBot/1.0; +https://status.michaellaplante.com)"
  - name: Onboarding
    url: https://onboarding.michaellaplante.com
    headers:
      - "User-Agent: Mozilla/5.0 (compatible; UpptimeBot/1.0; +https://status.michaellaplante.com)"
  - name: Brand
    url: https://brand.michaellaplante.com
    headers:
      - "User-Agent: Mozilla/5.0 (compatible; UpptimeBot/1.0; +https://status.michaellaplante.com)"
  - name: Search
    url: https://search.michaellaplante.com
    headers:
      - "User-Agent: Mozilla/5.0 (compatible; UpptimeBot/1.0; +https://status.michaellaplante.com)"

status-website:
  cname: status.michaellaplante.com
  logoUrl: https://raw.githubusercontent.com/mlaplante/status/master/assets/logo@2x.png
  name: Michael La Plante Status
  introTitle: "michaellaplante.com — live status"
  introMessage: Real-time uptime and response times for michaellaplante.com, the blog, and the contact form endpoint. Checks run every 5 minutes.
  navbar:
    - title: Status
      href: /
  customHeadHtml: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      /* Brand tokens (from brand.michaellaplante.com)
         Primary:  Indigo 500 #3F51B5 / 600 #3849A1 / 700 #303F8C
         Ink:      900 #111827 / 500 #374151 / 300 #6B7280
         Paper:    2 #F8F9FA / White #FFFFFF / Line 2 #E5E7EB
         Accents:  Green #4CAF50 / Red #F44336 / Orange #FF9800 */
      :root {
        --body-background-color: #f8f9fa !important;
        --body-text-color: #374151 !important;
        --card-background-color: #ffffff !important;
        --nav-background-color: #ffffff !important;
        --nav-border-bottom-color: #e5e7eb !important;
        --nav-current-border-bottom-color: #3f51b5 !important;
        --card-border-color: #e5e7eb !important;
        --up-border-left-color: #4caf50 !important;
        --tag-up-background-color: #4caf50 !important;
        --down-border-left-color: #f44336 !important;
        --tag-down-background-color: #f44336 !important;
        --down-background-color: #fdecea !important;
        --degraded-border-left-color: #ff9800 !important;
        --tag-degraded-background-color: #ff9800 !important;
        --change-background-color: #3f51b5 !important;
        --error-button-border-color: #303f8c !important;
        --error-button-background-color: #3f51b5 !important;
        --submit-button-border-color: #303f8c !important;
        --submit-button-background-color: #3f51b5 !important;
      }
      /* Force light regardless of OS preference */
      @media (prefers-color-scheme: dark) {
        :root {
          --body-background-color: #f8f9fa !important;
          --body-text-color: #374151 !important;
          --card-background-color: #ffffff !important;
          --nav-background-color: #ffffff !important;
          --nav-border-bottom-color: #e5e7eb !important;
          --nav-current-border-bottom-color: #3f51b5 !important;
          --card-border-color: #e5e7eb !important;
        }
      }
      html, body {
        font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
        background-color: var(--body-background-color) !important;
        color: var(--body-text-color) !important;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Poppins', sans-serif !important;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #111827 !important;
      }
      code, pre { font-family: 'Roboto Mono', ui-monospace, SFMono-Regular, monospace !important; }
      a { color: #3f51b5 !important; }
      a:hover { color: #3849a1 !important; }
      nav a { font-weight: 500; }
      nav [aria-current] { color: #111827 !important; border-bottom-color: #3f51b5 !important; }
      /* Upptime sparkline uses mint (#1abc9c) or green (#20bf6b) as SVG fill/stroke */
      svg path[fill="#1abc9c"], svg path[fill="#20bf6b"],
      svg [fill="#1abc9c"], svg [fill="#20bf6b"] { fill: #4caf50 !important; }
      svg [stroke="#1abc9c"], svg [stroke="#20bf6b"] { stroke: #4caf50 !important; }
      /* Hide "Powered by Upptime" footer attribution */
      footer { display: none !important; }
      /* Logo sizing (wordmark is wide, not square) */
      header img, .logo img, img[alt*="logo" i] {
        height: 44px !important;
        width: auto !important;
        max-width: 280px;
      }
      body { line-height: 1.6; }
      ::selection { background: #3f51b5; color: #fff; }
    </style>

assignees:
  - mlaplante

# Notifications, Slack, etc: https://upptime.js.org/docs/notifications
